<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday, My Love ❤</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎂</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="confetti-canvas"></canvas>
  <div id="balloons" aria-hidden="true"></div>

  <!-- ============ START MENU ============ -->
  <main id="screen-menu" class="screen active">
    <div class="menu-card">
      <p class="menu-eyebrow">A little surprise, made just for you…</p>
      <h1 class="menu-title">Happy Birthday<span class="menu-name"></span></h1>
      <p class="menu-subtitle">Pick your present 🎁</p>
      <div class="menu-buttons">
        <button class="menu-btn" data-goto="screen-message">
          <span class="menu-btn-icon">💌</span>
          <span class="menu-btn-label">Read My Message</span>
          <span class="menu-btn-hint">A few words from my heart</span>
        </button>
        <button class="menu-btn" data-goto="screen-game">
          <span class="menu-btn-icon">🎮</span>
          <span class="menu-btn-label">Noughts &amp; Crosses</span>
          <span class="menu-btn-hint">Hearts vs. kisses — best of forever</span>
        </button>
      </div>
    </div>
  </main>

  <!-- ============ LOVE MESSAGE ============ -->
  <section id="screen-message" class="screen">
    <div class="letter">
      <div class="letter-header">
        <span class="letter-seal">❤</span>
        <h2 class="letter-title">To the love of my life</h2>
      </div>
      <div id="letter-body" class="letter-body"></div>
      <p id="letter-signature" class="letter-signature"></p>
      <button id="letter-replay" class="small-btn hidden">↻ Read it again</button>
    </div>
    <button class="back-btn" data-goto="screen-menu">← Back to menu</button>
  </section>

  <!-- ============ NOUGHTS & CROSSES ============ -->
  <section id="screen-game" class="screen">
    <div class="game-wrap">
      <h2 class="game-title">Noughts &amp; Crosses</h2>
      <p class="game-tagline">You're the hearts ♥ — you already won mine.</p>

      <div class="game-modes" role="group" aria-label="Game mode">
        <button id="mode-cupid" class="mode-btn selected">vs. Cupid 🏹</button>
        <button id="mode-duo" class="mode-btn">2 Players 👩‍❤️‍👨</button>
      </div>

      <p id="game-status" class="game-status">Your move, birthday girl ♥</p>

      <div id="board" class="board" role="grid" aria-label="Noughts and crosses board">
        <button class="cell" data-i="0" role="gridcell"></button>
        <button class="cell" data-i="1" role="gridcell"></button>
        <button class="cell" data-i="2" role="gridcell"></button>
        <button class="cell" data-i="3" role="gridcell"></button>
        <button class="cell" data-i="4" role="gridcell"></button>
        <button class="cell" data-i="5" role="gridcell"></button>
        <button class="cell" data-i="6" role="gridcell"></button>
        <button class="cell" data-i="7" role="gridcell"></button>
        <button class="cell" data-i="8" role="gridcell"></button>
      </div>

      <div class="scoreboard">
        <div class="score"><span class="score-label">♥ You</span><span id="score-hearts">0</span></div>
        <div class="score"><span class="score-label">Draws</span><span id="score-draws">0</span></div>
        <div class="score"><span class="score-label" id="score-x-label">✗ Cupid</span><span id="score-crosses">0</span></div>
      </div>

      <button id="game-restart" class="small-btn">↻ New round</button>
    </div>
    <button class="back-btn" data-goto="screen-menu">← Back to menu</button>
  </section>

  <script src="js/config.js"></script>
  <script src="js/confetti.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
